<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinterest Clone</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Material Icons for UI -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>

  <!-- Top Navigation Bar -->
  <header class="navbar">
    <div class="nav-brand">
      <div class="logo">
        <svg height="24" width="24" viewBox="0 0 24 24" aria-label="Pinterest" role="img">
          <path d="M11.98 0C5.36 0 0 5.37 0 11.99c0 5.08 3.16 9.42 7.6 11.16-.1-.94-.2-2.38.04-3.4.21-.9 1.4-5.92 1.4-5.92s-.36-.71-.36-1.76c0-1.65.96-2.88 2.15-2.88 1.01 0 1.5.76 1.5 1.68 0 1.02-.65 2.54-.99 3.96-.28 1.18.59 2.15 1.76 2.15 2.12 0 3.74-2.23 3.74-5.46 0-2.86-2.05-4.86-5-4.86-3.4 0-5.39 2.55-5.39 5.18 0 1.03.4 2.13.89 2.73.1.12.11.23.08.35-.09.38-.29 1.18-.33 1.34-.05.21-.18.25-.4.15-1.48-.69-2.4-2.88-2.4-4.63 0-3.77 2.74-7.23 7.9-7.23 4.14 0 7.36 2.95 7.36 6.9 0 4.12-2.6 7.43-6.2 7.43-1.21 0-2.35-.63-2.74-1.37l-.75 2.85c-.27 1.04-1.01 2.34-1.5 3.14 1.14.35 2.35.53 3.59.53 6.62 0 11.98-5.37 11.98-11.99S18.6 0 11.98 0z" fill="#E60023"></path>
        </svg>
      </div>
      <button class="nav-btn active">Home</button>
      <button class="nav-btn">Create</button>
    </div>

    <div class="search-container">
      <span class="material-icons-round search-icon">search</span>
      <input type="text" class="search-input" placeholder="Search">
    </div>

    <div class="nav-actions">
      <button class="icon-btn" title="Notifications">
        <span class="material-icons-round">notifications</span>
      </button>
      <button class="icon-btn" title="Messages">
        <span class="material-icons-round">chat</span>
      </button>
      <div class="profile-pic" title="Profile">
        <img src="https://ui-avatars.com/api/?name=User&background=111&color=fff&rounded=true" alt="Profile">
      </div>
      <button class="icon-btn small" title="Accounts and more options">
        <span class="material-icons-round">expand_more</span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <div id="masonry-grid" class="masonry-grid">
      <!-- JavaScript will populate columns and pins here -->
    </div>
    
    <!-- Loading Spinner -->
    <div id="loader" class="loader-container">
      <div class="spinner"></div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
